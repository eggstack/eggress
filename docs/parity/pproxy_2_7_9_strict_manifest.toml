# pproxy 2.7.9 Strict Behavioral Compatibility Manifest
#
# Each record represents one discoverable capability that must be validated
# through paired oracle/candidate testing. The oracle is the reference
# pproxy 2.7.9 installation; the candidate is the eggress implementation.
#
# CORRECTIVE PASS NOTICE: This manifest is under active review as part of
# the Milestones A-C Corrective Pass (plans/MILESTONES_A_C_CORRECTIVE_PASS.md).
# Records using `comparator = "module_existence"` with `status = "drop_in"`
# have namespace evidence only and require behavioral validation before true
# drop_in status can be claimed. See the corrective pass plan for details.
#
# Status vocabulary:
#   gap               - candidate does not implement this capability
#   drop_in           - candidate matches oracle behavior exactly
#   known_upstream_defect - candidate behavior differs due to upstream limitation
#   platform_constraint  - capability is platform-gated
#   not_applicable    - capability does not apply to the candidate architecture
#   intentional_non_parity - capability is intentionally not implemented
#
# Comparator vocabulary:
#   async_callable_signature  - compare async callable signature
#   module_existence          - verify module/symbol exists
#   constant_value            - compare constant value
#   enum_membership           - compare enum/int constant membership
#   method_signature           - compare method signature
#   property_existence         - verify property exists on class
#   class_hierarchy            - compare class bases/MRO
#   cli_flag_parse             - verify CLI flag is parsed correctly
#   cli_flag_rejection         - verify CLI flag is rejected with diagnostic
#   protocol_wire              - compare wire-level protocol behavior
#   cipher_roundtrip           - compare encrypt/decrypt roundtrip
#   cipher_kat                 - compare known-answer test vectors
#   process_lifecycle           - compare process start/stop behavior
#   failure_class              - compare failure category
#   composition_validity       - verify protocol x role combination is accepted
#   composition_rejection      - verify protocol x role combination is rejected

