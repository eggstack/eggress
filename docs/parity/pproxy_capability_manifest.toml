# pproxy Capability Manifest (Phase 37)
#
# Authoritative compatibility contract for pproxy parity.
# Each entry is one granular capability with tier, layer, and evidence.
#
# Tiers: drop_in, compatible_with_warning, native_equivalent,
#         intentional_non_parity, unsupported
# Layers: complete, partial, not_started, not_applicable, refused
# Evidence: differential, integration, unit, synthetic, docs_only, none

[meta]
manifest_version = "1"
pproxy_version = "2.7.9"
schema = "phase_37"

