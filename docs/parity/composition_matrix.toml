# Composition Matrix (Phase A2)
#
# Machine-readable composition graph for pproxy parity.
# Maps protocol×role×traffic_kind combinations to capability IDs and evidence.
#
# DO NOT edit by hand — generated from code. Use the validator to check:
#   python3 scripts/validate_pproxy_parity_manifest.py --check-matrix \
#       docs/parity/composition_matrix.toml
#
# Cross-references pproxy_capability_manifest.toml capability IDs.

[matrix]
schema_version = "1"
manifest_ref = "docs/parity/pproxy_capability_manifest.toml"
description = "Explicit composition graph preventing false parity claims"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
