[graph]
targets = []

[advisories]
ignore = [
    # rustls-pemfile is unmaintained but dev-only; migrate when rustls-pki-types PemObject is stable
    "RUSTSEC-2025-0134",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CDLA-Permissive-2.0",
]

[licenses.private]
ignore = false
registries = []

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = [
    # No OpenSSL — project is ring-only via rustls
    { name = "openssl-sys", wrappers = ["openssl"] },
    # No native-tls — project is ring-only via rustls
    { name = "native-tls", wrappers = ["native-tls"] },
    # No aws-lc-sys — project uses ring for rustls crypto provider
    { name = "aws-lc-sys" },
    # No cmake builds in production dependency graph
    { name = "cmake" },
]
skip = []
skip-tree = []

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = []
gitlab = []
bitbucket = []
