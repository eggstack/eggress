[graph]
targets = []

[advisories]
ignore = []

# Note: `rustls-pemfile` (RUSTSEC-2025-0134) is flagged as unmaintained by
# `cargo audit` (informational, no CVE). The crate is a thin wrapper around
# `rustls-pki-types` PEM parsing code. `cargo deny check advisories` does not
# flag it; `cargo audit` emits an "unmaintained" warning only. We accept this
# dependency until a planned migration replaces `rustls_pemfile::certs` /
# `rustls_pemfile::pkcs8_private_keys` in `eggress-transport-tls` and
# `eggress-protocol-trojan` with the `rustls_pki_types::pem::PemObject` API.
# Until then, do NOT add this advisory to `ignore` — it is intentionally
# visible to `cargo audit` so it surfaces in local verification.

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CDLA-Permissive-2.0",
]

[licenses.private]
ignore = false
registries = []

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = [
    # No OpenSSL — project is ring-only via rustls
    { name = "openssl-sys" },
    # No native-tls — project is ring-only via rustls
    { name = "native-tls" },
    # No aws-lc-sys — project uses ring for rustls crypto provider
    { name = "aws-lc-sys" },
    # No cmake builds in production dependency graph
    { name = "cmake" },
]
skip = []
skip-tree = []

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = []
gitlab = []
bitbucket = []
