schema_version = 1

[[scenarios]]
id = "tcp.socks4_connect"
capability_ids = ["protocol.socks4_connect"]
description = "SOCKS4 CONNECT to TCP echo server"
pproxy_args = ["-l", "socks4://127.0.0.1:{PORT}", "-r", "direct"]
eggress_toml = """
version = 1

[[listeners]]
name = "test"
bind = "127.0.0.1:{PORT}"
protocols = ["socks4"]
"""
expected_equivalence = "payload"
category = "http_socks_tcp"
timeout_secs = 10
client_action = "socks4_connect"

