[[scenarios]]
id = "tcp.http_connect_domain"
capability_ids = ["protocol.http_connect", "protocol.domain_resolution"]
description = "HTTP CONNECT to domain-based target"
pproxy_args = ["-l", "http://127.0.0.1:{PORT}", "-r", "direct"]
eggress_toml = """
version = 1

[[listeners]]
name = "test"
bind = "127.0.0.1:{PORT}"
protocols = ["http"]
"""
expected_equivalence = "coarse_result"
category = "http_socks_tcp"
timeout_secs = 10
client_action = "http_connect"
expected_divergences = ["domain resolution may differ between implementations"]

