schema_version = 1

[[scenarios]]
id = "tcp.http_connect"
capability_ids = ["protocol.http_connect"]
description = "HTTP CONNECT to TCP echo server"
pproxy_args = ["-l", "http://127.0.0.1:{PORT}", "-r", "direct"]
eggress_toml = """
version = 1

[[listeners]]
name = "test"
bind = "127.0.0.1:{PORT}"
protocols = ["http"]
"""
expected_equivalence = "payload"
category = "http_socks_tcp"
timeout_secs = 10
client_action = "http_connect"

[[scenarios]]
id = "tcp.http_forward_get"
capability_ids = ["protocol.http_forward_get"]
description = "HTTP forward proxy GET request"
pproxy_args = ["-l", "http://127.0.0.1:{PORT}", "-r", "direct"]
eggress_toml = """
version = 1

[[listeners]]
name = "test"
bind = "127.0.0.1:{PORT}"
protocols = ["http"]
"""
expected_equivalence = "payload"
category = "http_socks_tcp"
timeout_secs = 10
client_action = "http_forward_get"
normalization = { strip_log_prefixes = true, normalize_ports = true, normalize_line_endings = true }

