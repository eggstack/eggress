[[scenarios]]
id = "cli.ss_default"
capability_ids = ["cli.ss_default", "uri.ss"]
description = "Shadowsocks listener with direct routing"
pproxy_args = ["-l", "ss://127.0.0.1:{PORT}#testuser:testpass", "-r", "direct"]
eggress_toml = """
