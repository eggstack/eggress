schema_version = 1

[[scenarios]]
id = "cli.socks5_default"
capability_ids = ["cli.socks5_default", "uri.socks5"]
description = "SOCKS5 listener on default port with direct routing"
pproxy_args = ["-l", "socks5://127.0.0.1:{PORT}", "-r", "direct"]
eggress_toml = """
version = 1

[[listeners]]
name = "test"
bind = "127.0.0.1:{PORT}"
protocols = ["socks5"]
"""
expected_equivalence = "coarse_result"
category = "cli_defaults"
timeout_secs = 10
client_action = "none"

