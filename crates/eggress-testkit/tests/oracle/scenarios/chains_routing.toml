client_action = "socks5_tcp_connect"

[[scenarios]]
id = "rules.reject_ip"
capability_ids = ["routing.reject_ip"]
description = "Rule rejecting connections to specific IP"
pproxy_args = ["-l", "socks5://127.0.0.1:{PORT}", "-r", "direct", "-b", "127.0.0.2"]
eggress_toml = """
version = 1

[[listeners]]
name = "test"
bind = "127.0.0.1:{PORT}"
protocols = ["socks5"]

[[rules]]
id = "reject-ip"
host_regex = "127\\.0\\.0\\.2"
reject = "blocked"
"""
expected_equivalence = "coarse_result"
category = "rules"
timeout_secs = 10
client_action = "socks5_tcp_connect"

