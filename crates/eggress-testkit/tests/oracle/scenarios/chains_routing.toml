category = "chains"
timeout_secs = 15
client_action = "socks5_tcp_connect_auth"

[[scenarios]]
id = "chain.ss_to_socks5"
capability_ids = ["routing.chain_ss_socks5"]
description = "Shadowsocks chained through SOCKS5 upstream"
pproxy_args = ["-l", "ss://127.0.0.1:{PORT}#testuser:testpass", "-r", "socks5://127.0.0.1:{UPSTREAM_PORT}"]
eggress_toml = """
version = 1

[[listeners]]
name = "test"
bind = "127.0.0.1:{PORT}"
protocols = ["shadowsocks"]

[listeners.shadowsocks]
password = "testpass"
method = "aes-256-gcm"

[[upstreams]]
