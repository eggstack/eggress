schema_version = 1

[[scenarios]]
id = "chain.socks5_to_socks5"
capability_ids = ["routing.chain_socks5_socks5"]
description = "SOCKS5 chained through another SOCKS5 upstream"
pproxy_args = ["-l", "socks5://127.0.0.1:{PORT}", "-r", "socks5://127.0.0.1:{UPSTREAM_PORT}"]
eggress_toml = """
version = 1

[[listeners]]
name = "test"
bind = "127.0.0.1:{PORT}"
protocols = ["socks5"]

[[upstreams]]
id = "upstream-0"
uri = "socks5://127.0.0.1:{UPSTREAM_PORT}"

[[upstream_groups]]
id = "chain-group"
members = ["upstream-0"]

[[rules]]
id = "route-all"
upstream_group = "chain-group"
"""
expected_equivalence = "payload"
category = "chains"
timeout_secs = 15
client_action = "socks5_tcp_connect"

