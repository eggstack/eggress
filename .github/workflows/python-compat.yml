name: Python Compatibility Distribution

on:
  pull_request:
    paths:
      - 'crates/eggress-embed/**'
      - 'crates/eggress-python/**'
      - 'python/**'
      - 'python-pproxy-compat/**'
      - 'python/tests/test_proxy_connection.py'
      - '.github/workflows/python-compat.yml'
  push:
    branches: [main]
    paths:
      - 'crates/eggress-embed/**'
      - 'crates/eggress-python/**'
      - 'python/**'
      - 'python-pproxy-compat/**'
      - 'python/tests/test_proxy_connection.py'
      - '.github/workflows/python-compat.yml'
  workflow_dispatch:

jobs:
  clean-wheel-smoke:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install build and cipher dependencies
        run: python -m pip install "maturin>=1.0,<2.0" "cryptography>=42,<47" pytest "pytest-asyncio>=0.23,<1"
      - name: Build canonical wheel
        run: maturin build --release --out dist
        working-directory: crates/eggress-python
      - name: Build compatibility wheel
        run: python -m pip wheel --no-deps --wheel-dir compat-dist ./python-pproxy-compat
      - name: Install both wheels in a clean environment
        shell: bash
        run: |
          python -m venv .compat-venv
          if [[ "$RUNNER_OS" == "Windows" ]]; then VENV_PY=.compat-venv/Scripts/python.exe; else VENV_PY=.compat-venv/bin/python; fi
          "$VENV_PY" -m pip install --upgrade pip
          "$VENV_PY" -m pip install crates/eggress-python/dist/eggress-*.whl compat-dist/eggress_pproxy_compat-*.whl "cryptography>=42,<47" pytest "pytest-asyncio>=0.23,<1"
          "$VENV_PY" -c "import eggress, pproxy; from pproxy import Connection, Server; assert eggress.__version__ == '0.1.0'; print('clean compatibility import passed')"
      - name: Test native outbound and wheel imports
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then VENV_PY=.compat-venv/Scripts/python.exe; else VENV_PY=.compat-venv/bin/python; fi
          "$VENV_PY" -m pytest --import-mode=importlib python/tests/test_proxy_connection.py python/tests/test_wheel_import_smoke.py -q
