name: Python Tests

on:
  pull_request:
    paths:
      - 'crates/eggress-python/**'
      - 'python/**'
      - '.github/workflows/python-test.yml'
  push:
    branches: [main]
    paths:
      - 'crates/eggress-python/**'
      - 'python/**'
      - '.github/workflows/python-test.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.9", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install maturin
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install "maturin>=1.0,<2.0"
          echo "VIRTUAL_ENV=${{ github.workspace }}/.venv" >> "$GITHUB_ENV"
          echo "${{ github.workspace }}/.venv/bin" >> "$GITHUB_PATH"
      - name: Clean stale native extension
        # Maturin leaves a per-build `_eggress.cpython-*.so` under python/eggress/
        # which is .gitignored. If a stale build from a different architecture
        # or Python interpreter is present, pytest collection will fail with
        # import errors. Remove any such stale artifacts before building.
        run: git clean -fX python/eggress
      - name: Build and install
        run: maturin develop
        working-directory: crates/eggress-python
      - name: Verify py.typed
        run: python -c "import importlib.resources; p = importlib.resources.files('eggress').joinpath('py.typed'); assert p.is_file(), 'py.typed not found'; print('py.typed found')"
      - name: Syntax check
        run: python -m compileall python/eggress
      - name: Install test dependencies
        run: pip install pytest
      - name: Run tests
        run: python -m pytest python/tests -v
      - name: Wheel import smoke tests
        run: python -m pytest python/tests/test_wheel_import_smoke.py -v
