name: strict-differential

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  strict-integrity:
    name: Strict Manifest Integrity
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Validate strict manifest
        run: cargo test -p eggress-testkit strict_manifest
      - name: Validate strict report freshness
        run: cargo run -p eggress-testkit --bin strict-report -- --check
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check release docs consistency
        run: python3 scripts/check_release_docs.py

  strict-paired-api:
    name: Strict Paired API (Python 3.11)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: strict-integrity
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Set up oracle venv
        run: |
          python3 -m venv .venv-oracle
          .venv-oracle/bin/pip install --upgrade pip
          .venv-oracle/bin/pip install "pproxy==2.7.9"
          .venv-oracle/bin/pip install pysocks cryptography
      - name: Verify pproxy oracle
        run: .venv-oracle/bin/python -c "from importlib.metadata import version; print(f'pproxy {version(\"pproxy\")}')"
      - name: Set up candidate venv
        run: |
          python3 -m venv .venv-candidate
          .venv-candidate/bin/pip install --upgrade pip
          .venv-candidate/bin/pip install maturin pytest pytest-asyncio pytest-timeout cryptography
      - name: Build eggress wheel
        run: .venv-candidate/bin/maturin build --release --out target/wheels -m crates/eggress-python/Cargo.toml
      - name: Install eggress wheel
        run: |
          WHEEL=$(ls target/wheels/eggress-*.whl)
          .venv-candidate/bin/pip install "$WHEEL"
      - name: Build and install compat wheel
        run: |
          .venv-candidate/bin/pip wheel --no-deps --wheel-dir target/wheels ./python-pproxy-compat
          COMPAT_WHEEL=$(ls target/wheels/eggress_pproxy_compat-*.whl)
          .venv-candidate/bin/pip install "$COMPAT_WHEEL"
      - name: Verify candidate imports
        run: |
          .venv-candidate/bin/python -c "import pproxy; print(f'candidate pproxy OK')"
          .venv-candidate/bin/python -c "import eggress; print(f'candidate eggress OK')"
      - name: Run paired API probes
        env:
          ORACLE_VENV: ${{ github.workspace }}/.venv-oracle
          CANDIDATE_VENV: ${{ github.workspace }}/.venv-candidate
        run: |
          python3 scripts/run_strict_pproxy_api.py \
            --oracle-venv "$ORACLE_VENV" \
            --candidate-venv "$CANDIDATE_VENV"
      - name: Run strict differential tests
        env:
          EGRESS_REQUIRE_PPROXY_DIFFERENTIAL: "1"
        run: |
          .venv-candidate/bin/python -m pytest python/tests/strict/ -v --timeout=60
      - name: Run oracle example fixtures
        run: |
          for f in compat/pproxy-2.7.9/examples/direct_tcp.py \
                   compat/pproxy-2.7.9/examples/chain_example.py \
                   compat/pproxy-2.7.9/examples/server_config.py \
                   compat/pproxy-2.7.9/examples/client_connection.py; do
            echo "=== $f ==="
            .venv-oracle/bin/python "$f" || exit 1
          done
      - name: Run network examples against candidate
        run: |
          PROXY_URI=direct:// .venv-candidate/bin/python \
            compat/pproxy-2.7.9/examples/tcp_echo_through_proxy.py || exit 1
          .venv-candidate/bin/python \
            compat/pproxy-2.7.9/examples/server_start_lifecycle.py || exit 1
      - name: Upload paired observations
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: strict-paired-observations-${{ github.sha }}
          path: target/strict/paired_observations/
          if-no-files-found: warn
          retention-days: 30

  strict-closure-audit:
    name: Strict Closure Audit
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [strict-integrity, strict-paired-api]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install cargo tools
        run: |
          cargo install cargo-deny
          cargo install cargo-audit
      - name: Install pproxy oracle (system)
        run: pip install "pproxy==2.7.9"
      - name: Install maturin
        run: pip install maturin
      - name: Run authoritative closure audit
        run: ./scripts/run_strict_pproxy_closure_audit.sh
      - name: Upload closure audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: strict-closure-audit-${{ github.sha }}
          path: target/closure-audit/
          if-no-files-found: error
          retention-days: 90
