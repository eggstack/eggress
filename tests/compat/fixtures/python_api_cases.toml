# Python API Compatibility Fixture
#
# Test cases comparing pproxy's Python API surface against eggress's Python
# bindings (eggress-embed + eggress-python). Each case documents:
#   - what pproxy does
#   - what eggress does (or "N/A" if not applicable)
#   - the compatibility tier
#   - optional notes
#
# Tier taxonomy (from docs/PPROXY_PARITY_SPEC.md):
#   A - Exact:    Same API name, same parameters, same return type, same behavior
#   B - Functional: Different API shape but achieves the same outcome
#   C - Partial:  Some aspects covered, others missing
#   D - Deferred: Intentionally not yet covered (future work)
#   N/A:          Design does not apply to eggress (different architecture)

# ============================================================================
# 1. Module Exports
# ============================================================================

[[case]]
id = "py_module_exports"
category = "python_api"
description = "pproxy module exports Connection, Server, Rule, DIRECT"
pproxy_behavior = "import pproxy; assert hasattr(pproxy, 'Connection'); assert hasattr(pproxy, 'Server'); assert hasattr(pproxy, 'Rule'); assert hasattr(pproxy, 'DIRECT')"
egress_behavior = "import eggress; assert hasattr(eggress, 'EggressConfig'); assert hasattr(eggress, 'EggressService')"
tier = "B"
notes = "Different export names but same concept: factory functions + singleton"

[[case]]
id = "py_module_version"
category = "python_api"
description = "Both packages expose a version attribute"
pproxy_behavior = "import pproxy; assert isinstance(pproxy.__version__, str)"
egress_behavior = "import eggress; assert isinstance(eggress.__version__, str)"
tier = "A"

[[case]]
id = "py_module_all_exports"
category = "python_api"
description = "Both packages define __all__ for explicit public API"
pproxy_behavior = "import pproxy; assert hasattr(pproxy, '__all__')"
egress_behavior = "import eggress; assert hasattr(eggress, '__all__')"
tier = "A"

