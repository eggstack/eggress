tier = "A"
notes = "eggress-only feature"

[[case]]
id = "py_config_chain"
category = "python_api"
description = "Configure a multi-hop proxy chain"
pproxy_behavior = "proxy = pproxy.Connection('socks5://h1:1080__http://h2:8080')"
egress_behavior = "from eggress import EggressConfig; config = EggressConfig.from_toml('[[upstreams]]\\n[[upstreams.hops]]\\nscheme = \"socks5\"\\nhost = \"h1\"\\nport = 1080\\n[[upstreams.hops]]\\nscheme = \"http\"\\nhost = \"h2\"\\nport = 8080')"
tier = "B"
notes = "pproxy uses __-separated URI chain; eggress uses nested TOML"

[[case]]
id = "py_config_redacted_output"
category = "python_api"
description = "Both can produce redacted config representation"
pproxy_behavior = "# pproxy display uses redacted URI format via __repr__"
egress_behavior = "config = EggressConfig.from_toml(toml); redacted = config.redacted_toml(); assert 'password' not in redacted or '****' in redacted"
tier = "A"

