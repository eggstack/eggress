category = "python_api"
description = "pproxy.netloc_split parses host:port with IPv6 support"
pproxy_behavior = "from pproxy import netloc_split; host, port = netloc_split('[::1]:8080', '0.0.0.0', 80)"
egress_behavior = "N/A — host:port parsing is internal to the URI parser"
tier = "A"
notes = "Same semantics; pproxy exposes as utility function"

[[case]]
id = "py_uri_credential_in_uri"
category = "python_api"
description = "pproxy accepts user:pass in URI for SOCKS5"
pproxy_behavior = "proxy = pproxy.Server('socks5://user:pass@host:1080')"
egress_behavior = "from eggress import translate_pproxy_uri; result = translate_pproxy_uri('socks5://user:pass@host:1080'); assert result.ok"
tier = "B"

[[case]]
id = "py_uri_fragment_password"
category = "python_api"
description = "pproxy uses #fragment for password in some schemes"
pproxy_behavior = "proxy = pproxy.Server('ss:host:8388#password')"
egress_behavior = "from eggress import translate_pproxy_uri; result = translate_pproxy_uri('ss:host:8388#password'); assert result.ok"
tier = "B"
