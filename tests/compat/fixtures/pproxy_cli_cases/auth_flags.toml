id = "auth_flags"
args = ["-l", "socks5://127.0.0.1:1080", "-a", "user:pass", "-r", "http://127.0.0.1:8080"]
expected_exit_code = 0
expected_warnings = [
    "[alive-check] pproxy -a user:pass (alive check interval) maps to eggress health probes; configure 'health.interval' on each [[upstreams]] entry (e.g., interval = \"user:passs\")",
]
toml_content_must_contain = [
    "version = 1",
    "[[listeners]]",
    "[[upstreams]]",
    "[[upstream_groups]]",
    "[[rules]]",
]
