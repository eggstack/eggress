# ============================================================================
# 7. Standalone UDP (-ul/-ur flags)
# Note: These are CLI flags, not URI test cases. Documented here for reference.
# ============================================================================

# -ul :1081 → standalone_pproxy_udp on 0.0.0.0:1081
# -ul socks5://:1081 → same
# -ul 1081 → same
# -ur socks5://proxy:1080 → UDP upstream
# -ur direct → direct UDP forwarding
#
# These are tested via translate_pproxy_args() in translate.rs tests.

