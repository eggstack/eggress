# pproxy URI Golden Corpus Test Fixture
#
# Comprehensive test cases for pproxy URI compatibility testing.
# Each case documents: the raw URI, what pproxy does, what eggress should do,
# the compatibility tier, credential presence, redacted display, warnings,
# and expected generated TOML (if supported).
#
# Tier taxonomy (from docs/PARITY_MATRIX.md):
#   compatible               - eggress behavior matches pproxy for tested scenarios
#   supported                - eggress supports the feature, pproxy equivalence not claimed
#   partial                  - usable subset exists but not full compatibility
#   intentional_non_parity   - deliberately not replicated with rationale
#   unsupported              - not implemented
#
# Standalone UDP (-ul/-ur) flags are documented in comments only, since they
# are CLI flags rather than URI-based test cases.

# ============================================================================
# 1. HTTP/HTTPS
# ============================================================================

[[cases]]
id = "http_basic_listener"
raw_uri = "http://0.0.0.0:8080"
pproxy_interpretation = "Start HTTP CONNECT forward proxy on port 8080, all interfaces"
expected_interpretation = "HTTP CONNECT listener on 0.0.0.0:8080"
compatibility_tier = "compatible"
has_credentials = false
expected_redacted_display = "http://0.0.0.0:8080"
expected_warnings = []
expected_toml = '''
[[listeners]]
name = "pproxy-local-0"
bind = "0.0.0.0:8080"
protocols = ["http"]
'''

[[cases]]
id = "http_with_auth_listener"
raw_uri = "http://user:pass@proxy:8080"
pproxy_interpretation = "HTTP proxy with Basic auth on port 8080"
expected_interpretation = "HTTP CONNECT listener with auth on proxy:8080"
compatibility_tier = "compatible"
has_credentials = true
expected_redacted_display = "http://****:****@proxy:8080"
expected_warnings = ["credential-in-toml"]
expected_toml = '''
[[listeners]]
name = "pproxy-local-0"
bind = "proxy:8080"
protocols = ["http"]

[listeners.auth]
type = "password"
username = "user"
password = "pass"
'''

[[cases]]
id = "http_upstream"
raw_uri = "http://proxy:8080"
pproxy_interpretation = "Forward traffic to HTTP proxy upstream at proxy:8080"
expected_interpretation = "HTTP CONNECT upstream at proxy:8080"
compatibility_tier = "compatible"
has_credentials = false
expected_redacted_display = "http://proxy:8080"
expected_warnings = []
expected_toml = '''
[[upstreams]]
id = "pproxy-upstream-0"
uri = "http://proxy:8080"
'''

[[cases]]
id = "https_listener"
raw_uri = "https://0.0.0.0:8443"
pproxy_interpretation = "HTTP proxy with TLS on port 8443"
expected_interpretation = "HTTPS (HTTP+TLS) listener on 0.0.0.0:8443"
compatibility_tier = "compatible"
has_credentials = false
expected_redacted_display = "https://0.0.0.0:8443"
expected_warnings = []
expected_toml = '''
[[listeners]]
name = "pproxy-local-0"
bind = "0.0.0.0:8443"
protocols = ["http"]
'''

[[cases]]
id = "https_upstream"
raw_uri = "https://proxy:8443"
pproxy_interpretation = "Forward traffic to HTTPS upstream (HTTP over TLS)"
expected_interpretation = "HTTP CONNECT upstream with TLS wrapper at proxy:8443"
compatibility_tier = "compatible"
has_credentials = false
expected_redacted_display = "https://proxy:8443"
expected_warnings = []
# https upstream maps to http+tls in the config URI
expected_toml = '''
[[upstreams]]
id = "pproxy-upstream-0"
uri = "http+tls://proxy:8443"
'''

