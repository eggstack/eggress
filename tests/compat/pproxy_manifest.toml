# Phase 18 Compatibility Manifest
#
# Authoritative evidence index for pproxy feature parity.
# Each entry tracks a stable feature id, its category, evidence level,
# and which tests support the claim.
#
# Evidence levels:
#   unimplemented          - not implemented in eggress
#   implemented_synthetic  - implemented but only tested without real pproxy
#   implemented_differential - tested against real pproxy differential behavior
#   implemented_interop    - tested via external protocol interop (e.g. curl)
#   compatible             - real pproxy differential or interop evidence
#   intentional_non_parity - deliberately not replicated with rationale

[meta]
pproxy_version = "2.7.9"
manifest_version = "1"

