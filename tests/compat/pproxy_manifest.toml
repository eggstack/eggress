egress_status = "supported"
evidence_level = "implemented_synthetic"
tests = ["test_server_accepts_control_connection", "test_echo_relay_through_server", "test_client_server_roundtrip"]
divergence = "Simplified raw-relay model: 1-byte handshake (0x01=accept, 0x00=reject), raw user:pass auth bytes, bidirectional TCP relay. One session per control channel, no multiplexing. Matches pproxy wire format."

[[features]]
