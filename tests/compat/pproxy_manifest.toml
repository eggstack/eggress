category = "security"
pproxy_version = "2.7.9"
egress_status = "supported"
evidence_level = "implemented_synthetic"
tests = ["test_auth_success", "test_auth_failure", "test_auth_required_not_provided"]
divergence = "Raw user:pass bytes sent as single write, compared by server. Optional (no auth = send empty bytes). Plaintext, no challenge-response. Matches pproxy behavior."

[[features]]
